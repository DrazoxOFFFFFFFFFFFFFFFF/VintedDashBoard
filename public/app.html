<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VintedDashboard V2 — Centre Administratif</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VintedDash">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-store"></i>
                </div>
                <div class="logo-text">
                    <strong>VintedDash</strong>
                    <span>Centre administratif</span>
                </div>
            </div>
            <nav class="nav">
                <a class="nav-item active" data-page="dashboard">
                    <i class="fas fa-th-large"></i>
                    <span>Tableau de bord</span>
                </a>
                <a class="nav-item" data-page="stock">
                    <i class="fas fa-box"></i>
                    <span>Stock</span>
                    <span class="nav-badge">0</span>
                </a>
                <a class="nav-item" data-page="accounting">
                    <i class="fas fa-euro-sign"></i>
                    <span>Comptabilité</span>
                </a>
                <a class="nav-item" data-page="goals">
                    <i class="fas fa-bullseye"></i>
                    <span>Objectifs</span>
                </a>
                <a class="nav-item" id="adminLink" data-page="admin" style="display:none">
                    <i class="fas fa-shield-halved"></i>
                    <span>Administration</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="footer-goal">
                    <i class="fas fa-flag-checkered"></i>
                    <span>Objectif</span>
                    <strong id="sidebarGoal">2000€</strong>
                </div>
                <div class="progress-mini">
                    <div class="progress-mini-bar" id="sidebarProgress" style="width:0%"></div>
                </div>
                <div style="margin-top:12px;display:flex;gap:6px">
                    <button class="btn btn-ghost btn-xs" id="logoutBtn" style="flex:1;justify-content:center">
                        <i class="fas fa-right-from-bracket"></i> Déconnexion
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content" id="page-content"></main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
